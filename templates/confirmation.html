{% extends "base.html" %}
{% block title %}Request Submitted{% endblock %}
{% block content %}

<div class="sheet confirmation">
  <div class="check-icon">✓</div>
  <h1>Request submitted</h1>
  <p class="sub">Your request <strong>{{ ref_no }}</strong> has been recorded and is pending approval.</p>
  <a href="{{ url_for('new_request_form') }}" class="primary-link">Submit another request</a>
</div>

{% endblock %}
