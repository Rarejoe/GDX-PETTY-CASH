{% extends "base.html" %}
{% block title %}New Request{% endblock %}
{% block content %}

<div class="sheet">
  <div class="letterhead">
    <div>
      <h1>GDX PETTY CASH REQUEST</h1>
    </div>
    <div class="ref-box">
      Request No.<br><strong>{{ ref_no }}</strong>
    </div>
  </div>

  <form method="POST" action="{{ url_for('submit_request') }}" id="requestForm">

    <div class="meta-grid">
      <div class="field">
        <label>Requested by *</label>
        <input type="text" name="requester" required value="{{ form.requester if form else '' }}">
      </div>
      <div class="field">
        <label>Request date</label>
        <input type="date" name="request_date" value="{{ form.request_date if form else today }}">
      </div>
    </div>

    <table id="itemsTable">
      <thead>
        <tr>
          <th style="width:16%">Date</th>
          <th>Description</th>
          <th class="num" style="width:18%">Amount (₦)</th>
          <th style="width:30px"></th>
        </tr>
      </thead>
      <tbody id="itemsBody"></tbody>
    </table>

    <div class="row-controls">
      <button type="button" class="add-row" id="addRow">+ Add line item</button>
    </div>

    <div class="totals">
      <div class="totals-box">
        <div class="totals-row gross">
          <span>GROSS TOTAL</span>
          <span id="grossTotal">₦0.00</span>
        </div>
      </div>
    </div>

    <div class="signoff single">
      <div class="sig-block sig-pad-wrap">
        <label>Sign here *</label>
        <canvas class="sig-pad" id="sigPad"></canvas>
        <div class="sig-tools">
          <button type="button" id="clearSig">Clear signature</button>
          <span class="sig-hint">Draw with your finger or mouse</span>
        </div>
        <input type="hidden" name="signature_name" id="signatureName">
        <input type="hidden" name="signature_image" id="signatureImage">
      </div>
    </div>

    <div class="actions">
      <button type="submit" class="primary">Submit request</button>
    </div>
  </form>
</div>

<script>
const itemsBody = document.getElementById('itemsBody');

function formatMoney(n){
  return '₦' + (isNaN(n) ? 0 : n).toLocaleString('en-NG', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function recalcTotal(){
  let total = 0;
  document.querySelectorAll('.amt').forEach(inp => {
    const v = parseFloat(inp.value);
    if(!isNaN(v)) total += v;
  });
  document.getElementById('grossTotal').textContent = formatMoney(total);
}

function addRow(){
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td><input type="date" name="line_date[]"></td>
    <td><input type="text" name="line_desc[]" placeholder="What was it for?"></td>
    <td><input type="number" step="0.01" name="line_amount[]" class="amt" placeholder="0.00"></td>
    <td class="rm"><button type="button" title="Remove line">✕</button></td>
  `;
  tr.querySelector('.amt').addEventListener('input', recalcTotal);
  tr.querySelector('.rm button').addEventListener('click', () => {
    if(itemsBody.children.length <= 1) return;
    tr.remove();
    recalcTotal();
  });
  itemsBody.appendChild(tr);
}

document.getElementById('addRow').addEventListener('click', addRow);
for(let i=0;i<3;i++) addRow();

// ---- Signature pad ----
const canvas = document.getElementById('sigPad');
const ctx = canvas.getContext('2d');
let drawing = false, hasDrawn = false;

function resizeCanvas(){
  const ratio = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  const prevData = hasDrawn ? canvas.toDataURL() : null;
  canvas.width = rect.width * ratio;
  canvas.height = rect.height * ratio;
  ctx.scale(ratio, ratio);
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.strokeStyle = '#12294d';
  if(prevData){
    const img = new Image();
    img.onload = () => ctx.drawImage(img, 0, 0, rect.width, rect.height);
    img.src = prevData;
  }
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function getPos(e){
  const rect = canvas.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX - rect.left, y: t.clientY - rect.top };
}
function start(e){ e.preventDefault(); drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }
function move(e){
  if(!drawing) return;
  e.preventDefault();
  const p = getPos(e);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
  hasDrawn = true;
}
function end(){ drawing = false; }

canvas.addEventListener('mousedown', start);
canvas.addEventListener('mousemove', move);
window.addEventListener('mouseup', end);
canvas.addEventListener('touchstart', start, {passive:false});
canvas.addEventListener('touchmove', move, {passive:false});
canvas.addEventListener('touchend', end);

document.getElementById('clearSig').addEventListener('click', () => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  hasDrawn = false;
});

document.getElementById('requestForm').addEventListener('submit', function(e){
  let hasValidLine = false;
  document.querySelectorAll('#itemsBody tr').forEach(tr => {
    const desc = tr.querySelector('[name="line_desc[]"]').value.trim();
    const amt = parseFloat(tr.querySelector('[name="line_amount[]"]').value);
    if(desc && amt > 0) hasValidLine = true;
  });
  if(!hasValidLine){
    e.preventDefault();
    alert('Please add at least one expense line with a description and amount.');
    return;
  }
  if(!hasDrawn){
    e.preventDefault();
    alert('Please sign the request before submitting.');
    return;
  }
  document.getElementById('signatureName').value = document.querySelector('[name="requester"]').value.trim();
  document.getElementById('signatureImage').value = canvas.toDataURL('image/png');
});
</script>

{% endblock %}
